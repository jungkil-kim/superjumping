<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>클래스 예약</title>
  <style>
    :root {
      --primary: #D4548A;
      --primary-light: #FDEDF5;
      --primary-dark: #A83870;
      --orange: #F47C96;
      --orange-light: #FFF0F4;
      --bg: #FFF5FA;
      --card: #FFFFFF;
      --text: #2A1A23;
      --text-sub: #8A6070;
      --border: #F0D6E4;
      --success: #C2477A;
      --warning: #E07070;
      --danger: #C0334D;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      height: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
      background: var(--bg);
      color: var(--text);
      max-width: 430px;
      margin: 0 auto;
      min-height: 100%;
      position: relative;
      -webkit-font-smoothing: antialiased;
    }

    /* ========== LOADING ========== */
    #loading {
      position: fixed;
      inset: 0;
      background: rgba(255, 255, 255, 0.85);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    .spinner {
      width: 44px;
      height: 44px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ========== TOAST ========== */
    #toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: rgba(20, 20, 20, 0.9);
      color: #fff;
      padding: 11px 22px;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.25s, transform 0.25s;
      z-index: 5000;
      white-space: nowrap;
      max-width: 88%;
      text-align: center;
      pointer-events: none;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ========== AUTH SCREEN ========== */
    #auth-screen {
      min-height: 100vh;
      display: none;
      flex-direction: column;
      justify-content: center;
      padding: 48px 24px 40px;
      background: linear-gradient(160deg, #FFF0F7 0%, #FFE4F0 40%, #FFF5FA 100%);
    }

    .auth-logo {
      text-align: center;
      margin-bottom: 36px;
    }

    .auth-logo .logo-icon {
      display: block;
      margin-bottom: 8px;
    }

    .auth-logo h1 {
      font-size: 26px;
      font-weight: 900;
      color: var(--primary);
      letter-spacing: -0.5px;
    }

    .auth-logo p {
      color: var(--text-sub);
      font-size: 14px;
      margin-top: 6px;
    }

    /* auth card wrapper */
    #login-form, #register-form, #admin-form {
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(12px);
      border-radius: 24px;
      padding: 28px 20px 20px;
      box-shadow: 0 8px 32px rgba(212,84,138,0.12);
    }

    /* ========== FORMS ========== */
    .form-group {
      margin-bottom: 14px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-sub);
      margin-bottom: 7px;
    }

    .form-group input {
      width: 100%;
      padding: 15px 16px;
      border: 1.5px solid var(--border);
      border-radius: 14px;
      font-size: 16px;
      background: #FAFAFA;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
      -webkit-appearance: none;
      appearance: none;
    }

    .form-group input:focus {
      border-color: var(--primary);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(212,84,138,0.1);
    }

    /* ========== BUTTONS ========== */
    .btn {
      display: block;
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      text-align: center;
      letter-spacing: -0.2px;
    }

    .btn:active {
      transform: scale(0.975);
      opacity: 0.85;
    }

    .btn-primary {
      background: linear-gradient(135deg, #E06FA0 0%, #C2447A 100%);
      color: #fff;
      box-shadow: 0 4px 16px rgba(194,68,122,0.35);
    }

    .btn-primary:active {
      box-shadow: 0 2px 8px rgba(194,68,122,0.25);
    }

    .btn-outline {
      background: #fff;
      color: var(--primary);
      border: 1.5px solid var(--primary);
    }

    .btn-danger {
      background: var(--danger);
      color: #fff;
    }

    .btn-sm {
      width: auto;
      padding: 7px 14px;
      font-size: 13px;
      border-radius: 10px;
    }

    .btn-ghost-cancel {
      background: #FEE8E6;
      color: var(--danger);
    }

    .btn-ghost-wait {
      background: #FEF3E0;
      color: var(--warning);
    }

    /* ========== DIVIDER ========== */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 20px 0;
    }

    .text-center {
      text-align: center;
    }

    .text-link {
      color: var(--primary);
      font-weight: 700;
      cursor: pointer;
    }

    /* ========== MAIN APP ========== */
    #main-app {
      display: none;
    }

    /* ========== HEADER ========== */
    .header {
      background: linear-gradient(135deg, #E06FA0 0%, #C2447A 100%);
      color: #fff;
      padding: 14px 18px;
      padding-top: max(14px, env(safe-area-inset-top, 14px));
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 16px rgba(194,68,122,0.3);
    }

    .header-title {
      font-size: 17px;
      font-weight: 800;
      letter-spacing: -0.3px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-user {
      font-size: 13px;
      font-weight: 600;
      opacity: 0.9;
    }

    .btn-logout {
      background: rgba(255, 255, 255, 0.2);
      border: none;
      color: #fff;
      padding: 6px 13px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }

    /* ========== BOTTOM NAV ========== */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 430px;
      background: #fff;
      border-top: 1px solid var(--border);
      display: flex;
      padding-bottom: env(safe-area-inset-bottom, 0px);
      z-index: 100;
      box-shadow: 0 -2px 12px rgba(0, 0, 0, 0.06);
    }

    .nav-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 10px 0;
      border: none;
      background: none;
      color: #AAAAAA;
      font-size: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: color 0.15s;
      gap: 3px;
    }

    .nav-btn.active {
      color: var(--primary);
    }

    .nav-btn.active .nav-icon {
      filter: drop-shadow(0 2px 4px rgba(212,84,138,0.3));
    }

    .nav-icon {
      font-size: 22px;
      line-height: 1;
    }

    /* ========== SCREENS ========== */
    .screen {
      display: none;
      padding: 16px 16px 90px;
    }

    .screen.active {
      display: block;
    }

    /* ========== CARDS ========== */
    .card {
      background: #fff;
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: 0 2px 12px rgba(212,84,138,0.08);
      border: 1px solid rgba(212,84,138,0.08);
    }

    .section-title {
      font-size: 15px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 12px;
      letter-spacing: -0.3px;
    }

    /* ========== CLASS TABS ========== */
    .class-tabs {
      display: flex;
      background: #fff;
      border-radius: 14px;
      padding: 4px;
      margin-bottom: 14px;
      box-shadow: 0 1px 6px rgba(0, 0, 0, 0.05);
    }

    .class-tab {
      flex: 1;
      padding: 11px;
      border: none;
      border-radius: 11px;
      background: none;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      color: var(--text-sub);
      transition: all 0.2s;
      letter-spacing: -0.2px;
    }

    .class-tab.active {
      background: var(--primary);
      color: #fff;
    }

    /* ========== DATE SCROLL ========== */
    .date-scroll {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 4px 0 14px;
      scrollbar-width: none;
    }

    .date-scroll::-webkit-scrollbar {
      display: none;
    }

    .date-item {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 10px 12px;
      min-width: 54px;
      border-radius: 12px;
      background: #fff;
      border: 1.5px solid var(--border);
      cursor: pointer;
      transition: all 0.15s;
    }

    .date-item.active {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    .date-day-label {
      font-size: 11px;
      font-weight: 600;
      opacity: 0.75;
    }

    .date-num {
      font-size: 20px;
      font-weight: 800;
      line-height: 1.2;
    }

    .date-today-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--primary);
      margin-top: 3px;
    }

    .date-item.active .date-today-dot {
      background: rgba(255, 255, 255, 0.7);
    }

    .date-item.locked {
      opacity: 0.35;
      cursor: not-allowed;
      background: #f5f5f5;
    }

    /* ========== SLOT CARDS ========== */
    .slot-item {
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 10px;
      background: #fff;
      transition: border-color 0.15s;
    }

    .slot-item.status-available {
      border-color: var(--primary);
    }

    .slot-item.status-full {
      opacity: 0.65;
    }

    .slot-item.status-my-confirmed {
      background: var(--primary-light);
      border-color: var(--primary);
    }

    .slot-item.status-my-waitlist {
      background: #FEF3E0;
      border-color: var(--warning);
    }

    .slot-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .slot-time {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .slot-count {
      font-size: 13px;
      color: var(--text-sub);
      margin-top: 3px;
    }

    .slot-badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
    }

    .badge-available {
      background: var(--primary-light);
      color: var(--primary);
    }

    .badge-full {
      background: #FFE8E6;
      color: var(--danger);
    }

    .badge-waitlist {
      background: #FEF3E0;
      color: var(--warning);
    }

    .badge-confirmed {
      background: var(--primary);
      color: #fff;
    }

    .badge-my-wait {
      background: var(--warning);
      color: #fff;
    }

    .slot-actions {
      margin-top: 10px;
      display: flex;
      gap: 8px;
    }

    /* ========== MY RESERVATIONS ========== */
    .my-rsv-card {
      background: #fff;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 10px;
      box-shadow: 0 2px 12px rgba(212,84,138,0.08);
      border: 1px solid rgba(212,84,138,0.1);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .my-rsv-class {
      font-size: 16px;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .my-rsv-date {
      font-size: 13px;
      color: var(--text-sub);
    }

    .my-rsv-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
    }

    /* ========== TAGS ========== */
    .tag {
      display: inline-block;
      padding: 4px 11px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
    }

    .tag-confirmed {
      background: var(--primary-light);
      color: var(--primary);
    }

    .tag-waitlist {
      background: #FEF3E0;
      color: var(--warning);
    }

    /* ========== ADMIN ========== */
    .member-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 0;
      border-bottom: 1px solid var(--border);
    }

    .member-row:last-child {
      border-bottom: none;
    }

    .member-name-txt {
      font-weight: 700;
      font-size: 15px;
    }

    .member-phone-txt {
      font-size: 13px;
      color: var(--text-sub);
      margin-top: 2px;
    }

    /* ========== HOME OVERVIEW ========== */
    .overview-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .overview-slot {
      border-radius: 12px;
      padding: 12px;
      background: var(--bg);
      text-align: center;
    }

    .overview-time {
      font-size: 15px;
      font-weight: 800;
    }

    .overview-count {
      font-size: 12px;
      color: var(--text-sub);
      margin-top: 3px;
    }

    .overview-bar {
      height: 4px;
      border-radius: 2px;
      background: var(--border);
      margin-top: 8px;
      overflow: hidden;
    }

    .overview-bar-fill {
      height: 100%;
      border-radius: 2px;
      background: var(--primary);
      transition: width 0.4s;
    }

    .overview-bar-fill.full {
      background: var(--danger);
    }

    /* ========== EMPTY STATE ========== */
    .empty-state {
      text-align: center;
      padding: 48px 20px;
    }

    .empty-icon {
      font-size: 44px;
      line-height: 1;
      margin-bottom: 14px;
    }

    .empty-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
    }

    .empty-sub {
      font-size: 14px;
      color: var(--text-sub);
      margin-top: 6px;
    }

    /* ========== WEEKEND BANNER ========== */
    .weekend-banner {
      background: linear-gradient(135deg, #FDEDF5 0%, #F9C8DF 100%);
      border-radius: 18px;
      padding: 28px 20px;
      text-align: center;
      margin-bottom: 12px;
      border: 1px solid #F0C0D8;
    }

    .weekend-banner .icon {
      font-size: 48px;
      margin-bottom: 10px;
      animation: bounce 1.4s ease infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      40% { transform: translateY(-10px); }
      60% { transform: translateY(-5px); }
    }

    .weekend-banner h3 {
      font-size: 18px;
      font-weight: 800;
      color: var(--primary-dark);
    }

    .weekend-banner p {
      font-size: 14px;
      color: var(--primary);
      margin-top: 6px;
    }

    /* ========== CLASS SECTION HEADER ========== */
    .class-section-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 16px 10px;
      margin: 8px 0 4px;
      background: linear-gradient(135deg, #FDEDF5 0%, #FFF0F7 100%);
      border-radius: 16px;
      border: 1px solid var(--border);
    }

    .class-section-header .class-emoji {
      font-size: 26px;
    }

    .class-section-header .class-label {
      font-size: 16px;
      font-weight: 800;
      color: var(--primary-dark);
    }
  </style>
</head>

  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    // =====================================================
    // ★ 필수 설정 - Supabase 정보를 여기에 입력하세요! ★
    // =====================================================
    const SUPABASE_URL = 'https://znokmxgfxiqgjbmlnmgn.supabase.co';       // 예: https://abcxyz.supabase.co
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpub2tteGdmeGlxZ2pibWxubWduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3MDQ3ODgsImV4cCI6MjA5ODI4MDc4OH0.zJgkpd9QHb0uLDv50sxsAyb0jngYafdS2_I7i8v1gK4';  // Supabase 프로젝트 API 키

    const ADMIN_PHONE = 'morsejjang';
    const ADMIN_PIN   = 'wella1471';

    // =====================================================
    // 수업 시간표 설정
    // =====================================================
    const SCHEDULE = {
      jumping: {
        label: '점핑 클래스', emoji: '🤸‍♀️',
        max: 10,
        slots: {
          1: ['09:00', '10:00', '19:00', '20:00', '21:00'], // 월
          2: ['09:00', '10:00', '19:00', '20:00'],          // 화
          3: ['09:00', '10:00', '19:00', '20:00', '21:00'], // 수
          4: ['09:00', '10:00', '19:00', '20:00'],          // 목
          5: ['09:00', '10:00', '19:00', '20:00'],          // 금
        }
      },
      heated: {
        label: '온열 클래스', emoji: '🔥',
        max: 2,
        slots: {
          1: ['09:00', '10:00', '19:00', '20:00'],
          2: ['09:00', '10:00', '19:00', '20:00'],
          3: ['09:00', '10:00', '19:00', '20:00'],
          4: ['09:00', '10:00', '19:00', '20:00'],
          5: ['09:00', '10:00', '19:00', '20:00'],
        }
      }
    };

    const DAYS_KO = ['일', '월', '화', '수', '목', '금', '토'];

    // =====================================================
    // 앱 상태
    // =====================================================
    let db = null;
    let currentUser = null;
    let isAdmin = false;
    let activeScreen = 'home';

    // 예약 화면 상태
    let rv = {
      classType: 'jumping',
      selectedDate: null
    };

    // =====================================================
    // 초기화
    // =====================================================
    async function init() {
      try {
        if (!window.supabase) throw new Error('Supabase 라이브러리 로드 실패');
        db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // 자동 로그인: localStorage에 저장된 사용자 정보로 바로 입장
        const saved = localStorage.getItem('rsv_user');
        if (saved) {
          try {
            const parsed = JSON.parse(saved);
            if (parsed && (parsed.is_admin || (parsed.id && parsed.name))) {
              currentUser = parsed;
              isAdmin = !!parsed.is_admin;
              return enterApp();
            }
          } catch (e) { }
          localStorage.removeItem('rsv_user');
        }
      } catch (e) {
        console.error('초기화 오류:', e);
      }
      showAuth();
    }

    // =====================================================
    // 인증
    // =====================================================
    function showAuth() {
      document.getElementById('auth-screen').style.display = 'flex';
      document.getElementById('main-app').style.display = 'none';
    }

    function showLoginForm() {
      document.getElementById('login-form').style.display = 'block';
      document.getElementById('register-form').style.display = 'none';
      document.getElementById('admin-form').style.display = 'none';
      document.getElementById('login-phone').value = '';
      document.getElementById('login-pin').value = '';
    }

    function showRegisterForm() {
      document.getElementById('login-form').style.display = 'none';
      document.getElementById('register-form').style.display = 'block';
      document.getElementById('admin-form').style.display = 'none';
    }

    function showAdminForm() {
      document.getElementById('login-form').style.display = 'none';
      document.getElementById('register-form').style.display = 'none';
      document.getElementById('admin-form').style.display = 'block';
      document.getElementById('admin-login-id').value = '';
      document.getElementById('admin-login-pw').value = '';
      document.getElementById('admin-login-id').focus();
    }

    async function doAdminLogin() {
      const id = document.getElementById('admin-login-id').value.trim();
      const pw = document.getElementById('admin-login-pw').value.trim();
      if (!id || !pw) return showToast('아이디와 비밀번호를 입력해주세요.');
      if (id !== ADMIN_PHONE || pw !== ADMIN_PIN) return showToast('관리자 정보가 올바르지 않습니다.');
      currentUser = { name: '관리자', phone: ADMIN_PHONE, is_admin: true };
      isAdmin = true;
      localStorage.setItem('rsv_user', JSON.stringify(currentUser));
      enterApp();
    }

    async function doLogin() {
      const rawInput = document.getElementById('login-phone').value.trim();
      const pin      = document.getElementById('login-pin').value.trim();

      if (!rawInput || !pin) return showToast('아이디(전화번호)와 비밀번호를 입력해주세요.');

      // 관리자 로그인 (숫자 변환 전에 먼저 체크)
      if (rawInput === ADMIN_PHONE && pin === ADMIN_PIN) {
        currentUser = { name: '관리자', phone: ADMIN_PHONE, is_admin: true };
        isAdmin = true;
        localStorage.setItem('rsv_user', JSON.stringify(currentUser));
        return enterApp();
      }

      const phone = rawInput.replace(/\D/g, '');

      showLoading(true);
      const { data, error } = await db.from('users').select('*').eq('phone', phone).eq('pin', pin).single();
      showLoading(false);

      if (!data || error) return showToast('전화번호 또는 비밀번호가 올바르지 않습니다.');

      currentUser = data; isAdmin = !!data.is_admin;
      const autoLogin = document.getElementById('auto-login-chk');
      if (!autoLogin || autoLogin.checked) {
        localStorage.setItem('rsv_user', JSON.stringify(currentUser));
      }
      enterApp();
    }

    async function doRegister() {
      const name = document.getElementById('reg-name').value.trim();
      const phone = document.getElementById('reg-phone').value.trim().replace(/\D/g, '');
      const pin = document.getElementById('reg-pin').value.trim();

      if (!name) return showToast('이름을 입력해주세요.');
      if (!phone) return showToast('전화번호를 입력해주세요.');
      if (!pin || pin.length !== 4 || !/^\d{4}$/.test(pin)) return showToast('비밀번호는 숫자 4자리입니다.');

      showLoading(true);
      const { data, error } = await db.from('users').insert([{ name, phone, pin, is_admin: false }]).select().single();
      showLoading(false);

      if (error) {
        if (error.code === '23505') return showToast('이미 등록된 전화번호입니다.');
        if (error.code === '42501' || error.message?.includes('row-level security')) {
          return showToast('⚠️ Supabase RLS 오류 - SQL Editor에서 보안 설정을 확인해주세요.');
        }
        return showToast('오류: ' + (error.message || '알 수 없는 오류'));
      }

      currentUser = data; isAdmin = false;
      // 회원가입은 항상 자동 로그인 저장 (편의성)
      localStorage.setItem('rsv_user', JSON.stringify(currentUser));
      enterApp();
    }

    function doLogout() {
      if (!confirm('로그아웃 하시겠습니까?')) return;
      currentUser = null; isAdmin = false;
      localStorage.removeItem('rsv_user');
      showAuth();
      showLoginForm();
    }

    // =====================================================
    // 앱 진입
    // =====================================================
    function enterApp() {
      document.getElementById('auth-screen').style.display = 'none';
      document.getElementById('main-app').style.display = 'block';
      document.getElementById('header-username').textContent = currentUser.name + '님';

      // 관리자 탭 표시
      document.getElementById('nav-admin').style.display = isAdmin ? 'flex' : 'none';

      navigateTo('home');
    }

    // =====================================================
    // 네비게이션
    // =====================================================
    async function navigateTo(screen) {
      activeScreen = screen;
      document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
      document.getElementById('screen-' + screen).classList.add('active');
      const navEl = document.getElementById('nav-' + screen);
      if (navEl) navEl.classList.add('active');

      if (screen === 'home') await loadHome();
      if (screen === 'my') await loadMy();
      if (screen === 'admin') await loadAdmin();
    }

    // =====================================================
    // 홈+예약 통합 화면
    // =====================================================

    // 해당 날짜 예약 가능 여부: 전날 오후 1시부터 예약 가능
    function isDateBookable(date) {
      const now = new Date();
      const openTime = new Date(date);
      openTime.setDate(openTime.getDate() - 1);
      openTime.setHours(13, 0, 0, 0);
      return now >= openTime;
    }

    async function loadHome() {
      const today = new Date();
      const h = today.getHours();

      // 인사말
      const greeting = h < 12 ? '좋은 아침이에요 ☀️' : h < 18 ? '좋은 오후예요 💕' : '좋은 저녁이에요 🌙';
      document.getElementById('home-greeting').innerHTML = `
        <div style="padding:8px 4px 14px;display:flex;align-items:center;gap:10px">
          <span style="font-size:36px;filter:drop-shadow(0 2px 6px rgba(212,84,138,0.3))">🤸‍♀️</span>
          <div>
            <p style="font-size:18px;font-weight:900;letter-spacing:-0.5px;color:var(--primary-dark)">${greeting}</p>
            <p style="font-size:14px;color:var(--text-sub);margin-top:2px">${currentUser.name}님, 오늘도 건강하게 운동해요!</p>
          </div>
        </div>`;

      // 날짜 선택 초기화: 오늘 또는 첫 번째 예약 가능한 평일
      if (!rv.selectedDate) {
        for (let i = 0; i < 14; i++) {
          const d = new Date(today); d.setDate(today.getDate() + i);
          const dow = d.getDay();
          if (dow >= 1 && dow <= 5 && isDateBookable(d)) { rv.selectedDate = d; break; }
        }
      }

      renderHomeDates();
      await loadHomeSlots();
    }

    function renderHomeDates() {
      const today = new Date();
      let html = '';
      for (let i = 0; i < 14; i++) {
        const d = new Date(today); d.setDate(today.getDate() + i);
        const dow = d.getDay();
        if (dow === 0 || dow === 6) continue; // 평일만 표시
        const bookable = isDateBookable(d);
        const isSelected = rv.selectedDate && fmtDate(d) === fmtDate(rv.selectedDate);
        const isToday = i === 0;
        const clickAction = bookable
          ? `homeSelectDate(${d.getTime()})`
          : `showToast('전날 오후 1시 이후에 예약 가능합니다.')`;
        html += `<div class="date-item ${isSelected ? 'active' : ''} ${!bookable ? 'locked' : ''}" onclick="${clickAction}">
          <span class="date-day-label">${DAYS_KO[dow]}</span>
          <span class="date-num">${d.getDate()}</span>
          ${!bookable ? '<div style="font-size:9px;margin-top:3px">🔒</div>' : isToday ? '<div class="date-today-dot"></div>' : '<div style="height:8px"></div>'}
        </div>`;
      }
      document.getElementById('home-date-scroll').innerHTML = html;
    }

    async function homeSelectDate(ts) {
      rv.selectedDate = new Date(ts);
      renderHomeDates();
      await loadHomeSlots();
    }

    async function loadHomeSlots() {
      if (!rv.selectedDate) {
        document.getElementById('home-jumping-slots').innerHTML = '';
        document.getElementById('home-heated-slots').innerHTML = '';
        document.getElementById('home-my-today').innerHTML = '';
        return;
      }

      showLoading(true);
      const dateStr = fmtDate(rv.selectedDate);
      const dow = rv.selectedDate.getDay();

      // 두 클래스 예약 한 번에 조회
      const { data: rsvs } = await db.from('reservations')
        .select('*, users(name)')
        .eq('date', dateStr)
        .in('status', ['confirmed', 'waitlist']);
      showLoading(false);

      const confirmedCnt = {}, waitlistCnt = {}, myRsvMap = {};
      (rsvs || []).forEach(r => {
        const k = r.class_type + '_' + r.time_slot;
        if (r.status === 'confirmed') confirmedCnt[k] = (confirmedCnt[k] || 0) + 1;
        if (r.status === 'waitlist')  waitlistCnt[k]  = (waitlistCnt[k]  || 0) + 1;
        if (!isAdmin && r.user_id === currentUser.id) myRsvMap[k] = r;
      });

      // 오늘 날짜일 때 내 예약 요약 표시
      const isToday = fmtDate(rv.selectedDate) === fmtDate(new Date());
      const myRsvList = Object.values(myRsvMap);
      if (!isAdmin && isToday && myRsvList.length > 0) {
        let myHtml = `<div class="card" style="background:linear-gradient(135deg,#FDEDF5 0%,#FFF0F7 100%);border:1px solid #F0C0D8"><p class="section-title" style="color:var(--primary-dark)">💗 오늘 내 예약</p>`;
        myRsvList.forEach(r => {
          const cfg = SCHEDULE[r.class_type];
          myHtml += `<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)">
            <span style="font-size:22px">${cfg.emoji}</span>
            <div><div style="font-weight:700">${cfg.label}</div><div style="font-size:13px;color:var(--text-sub)">${fmtTime(r.time_slot)}</div></div>
            <span class="tag ${r.status === 'confirmed' ? 'tag-confirmed' : 'tag-waitlist'}" style="margin-left:auto">${r.status === 'confirmed' ? '예약완료' : '대기 ' + r.waitlist_position + '번'}</span>
          </div>`;
        });
        myHtml += '</div>';

      } else {
        document.getElementById('home-my-today').innerHTML = '';
      }

      // 클래스별 슬롯 렌더링
      function renderClassSlots(classType, containerId) {
        const cfg = SCHEDULE[classType];
        const times = cfg.slots[dow] || [];
        if (!times.length) { document.getElementById(containerId).innerHTML = ''; return; }

        let html = `<div class="card">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-bottom:12px;border-bottom:1.5px solid var(--border)">
            <span style="font-size:28px;filter:drop-shadow(0 2px 6px rgba(212,84,138,0.25))">${cfg.emoji}</span>
            <div>
              <p style="font-size:17px;font-weight:900;color:var(--primary-dark);letter-spacing:-0.3px">${cfg.label}</p>
              <p style="font-size:12px;color:var(--text-sub);margin-top:1px">최대 ${cfg.max}명</p>
            </div>
          </div>`;
        times.forEach(time => {
          const k = classType + '_' + time;
          const conf   = confirmedCnt[k] || 0;
          const wait   = waitlistCnt[k]  || 0;
          const remain = cfg.max - conf;
          const myRsv  = myRsvMap[k];
          let itemClass = '', badgeHtml = '', actionHtml = '';

          if (myRsv) {
            if (myRsv.status === 'confirmed') {
              itemClass = 'status-my-confirmed';
              badgeHtml = `<span class="slot-badge badge-confirmed">✓ 예약완료</span>`;
              if (!isAdmin) actionHtml = `<button class="btn btn-sm btn-ghost-cancel" onclick="cancelRsv('${myRsv.id}','${classType}','${dateStr}','${time}')">예약 취소</button>`;
            } else {
              itemClass = 'status-my-waitlist';
              badgeHtml = `<span class="slot-badge badge-my-wait">대기 ${myRsv.waitlist_position}번</span>`;
              if (!isAdmin) actionHtml = `<button class="btn btn-sm btn-ghost-wait" onclick="cancelRsv('${myRsv.id}','${classType}','${dateStr}','${time}')">대기 취소</button>`;
            }
          } else if (remain > 0) {
            itemClass = 'status-available';
            badgeHtml = `<span class="slot-badge badge-available">잔여 ${remain}/${cfg.max}</span>`;
            if (!isAdmin) actionHtml = `<button class="btn btn-sm btn-primary" onclick="doReserve('${classType}','${dateStr}','${time}')">예약하기</button>`;
          } else {
            itemClass = 'status-full';
            badgeHtml = `<span class="slot-badge badge-full">마감</span>`;
            if (!isAdmin) actionHtml = `<button class="btn btn-sm btn-ghost-wait" onclick="doWaitlist('${classType}','${dateStr}','${time}',${wait + 1})">대기 신청${wait > 0 ? ' (현재 ' + wait + '명)' : ''}</button>`;
          }

          const adminNames = isAdmin
            ? (rsvs || []).filter(r => r.class_type === classType && r.time_slot === time && r.status === 'confirmed').map(r => r.users?.name || '').join(', ')
            : '';

          html += `<div class="slot-item ${itemClass}">
            <div class="slot-top">
              <div>
                <div class="slot-time">${fmtTime(time)}</div>
                <div class="slot-count">${conf}/${cfg.max}명 확정${wait > 0 ? ' · 대기 ' + wait + '명' : ''}</div>
                ${adminNames ? `<div style="font-size:12px;color:var(--text-sub);margin-top:4px">${adminNames}</div>` : ''}
              </div>
              ${badgeHtml}
            </div>
            ${actionHtml ? `<div class="slot-actions">${actionHtml}</div>` : ''}
          </div>`;
        });
        html += '</div>';
        document.getElementById(containerId).innerHTML = html;
      }

      renderClassSlots('jumping', 'home-jumping-slots');
      renderClassSlots('heated',  'home-heated-slots');
    }

    // =====================================================
    // 예약 처리
    // =====================================================
    async function doReserve(classType, dateStr, timeSlot) {
      showLoading(true);

      // 취소된 예약이 있으면 UPDATE, 없으면 INSERT
      const { data: existing } = await db.from('reservations')
        .select('id').eq('user_id', currentUser.id)
        .eq('class_type', classType).eq('date', dateStr)
        .eq('time_slot', timeSlot).eq('status', 'cancelled').single();

      let error;
      if (existing) {
        ({ error } = await db.from('reservations')
          .update({ status: 'confirmed', waitlist_position: null })
          .eq('id', existing.id));
      } else {
        ({ error } = await db.from('reservations').insert([{
          user_id: currentUser.id, class_type: classType,
          date: dateStr, time_slot: timeSlot, status: 'confirmed'
        }]));
      }

      showLoading(false);
      if (error) return showToast('예약에 실패했습니다: ' + (error.message || ''));
      showToast('✅ 예약이 완료되었습니다!');
      await loadHomeSlots();
    }

    async function doWaitlist(classType, dateStr, timeSlot, position) {
      showLoading(true);

      // 취소된 예약이 있으면 UPDATE, 없으면 INSERT
      const { data: existing } = await db.from('reservations')
        .select('id').eq('user_id', currentUser.id)
        .eq('class_type', classType).eq('date', dateStr)
        .eq('time_slot', timeSlot).eq('status', 'cancelled').single();

      let error;
      if (existing) {
        ({ error } = await db.from('reservations')
          .update({ status: 'waitlist', waitlist_position: position })
          .eq('id', existing.id));
      } else {
        ({ error } = await db.from('reservations').insert([{
          user_id: currentUser.id, class_type: classType,
          date: dateStr, time_slot: timeSlot,
          status: 'waitlist', waitlist_position: position
        }]));
      }

      showLoading(false);
      if (error) return showToast('대기 신청에 실패했습니다: ' + (error.message || ''));
      showToast(`⏳ 예약 대기 ${position}번째로 등록되었습니다.`);
      await loadHomeSlots();
    }

    async function cancelRsv(rsvId, classType, dateStr, timeSlot) {
      if (!confirm('예약을 취소하시겠습니까?')) return;
      showLoading(true);

      const { data: rsv } = await db.from('reservations').select('*').eq('id', rsvId).single();
      if (!rsv) { showLoading(false); return showToast('예약 정보를 찾을 수 없습니다.'); }

      await db.from('reservations').update({ status: 'cancelled' }).eq('id', rsvId);

      if (rsv.status === 'confirmed') {
        // 대기자 자동 확정
        const { data: firstWait } = await db.from('reservations')
          .select('*').eq('class_type', classType).eq('date', dateStr)
          .eq('time_slot', timeSlot).eq('status', 'waitlist')
          .order('waitlist_position', { ascending: true }).limit(1);

        if (firstWait && firstWait.length > 0) {
          await db.from('reservations').update({ status: 'confirmed', waitlist_position: null }).eq('id', firstWait[0].id);
          // 남은 대기자 순번 재정렬
          const { data: remain } = await db.from('reservations')
            .select('id').eq('class_type', classType).eq('date', dateStr)
            .eq('time_slot', timeSlot).eq('status', 'waitlist')
            .order('waitlist_position', { ascending: true });
          if (remain) {
            for (let i = 0; i < remain.length; i++) {
              await db.from('reservations').update({ waitlist_position: i + 1 }).eq('id', remain[i].id);
            }
          }
          showToast('예약이 취소되었습니다. 대기자가 자동 확정되었습니다.');
        } else {
          showToast('예약이 취소되었습니다.');
        }
      } else {
        // 대기 취소 시 순번 재정렬
        const { data: remain } = await db.from('reservations')
          .select('id').eq('class_type', classType).eq('date', dateStr)
          .eq('time_slot', timeSlot).eq('status', 'waitlist')
          .order('waitlist_position', { ascending: true });
        if (remain) {
          for (let i = 0; i < remain.length; i++) {
            await db.from('reservations').update({ waitlist_position: i + 1 }).eq('id', remain[i].id);
          }
        }
        showToast('대기 신청이 취소되었습니다.');
      }

      showLoading(false);
      await loadHomeSlots();
      if (activeScreen === 'my') await loadMy();
    }

    function showAdminAddRsv() {
      const form = document.getElementById('admin-add-rsv-form');
      if (form) form.style.display = form.style.display === 'none' ? 'block' : 'none';
    }

    async function adminChangeDate(val) {
      adminRsvDate = val;
      await loadAdminReservations();
    }

    async function adminCancelRsv(rsvId, classType, dateStr, timeSlot) {
      if (!confirm('이 예약을 취소하시겠습니까?')) return;
      showLoading(true);
      const { data: rsv } = await db.from('reservations').select('*').eq('id', rsvId).single();
      await db.from('reservations').update({ status: 'cancelled' }).eq('id', rsvId);
      if (rsv && rsv.status === 'confirmed') {
        const { data: firstWait } = await db.from('reservations')
          .select('*').eq('class_type', classType).eq('date', dateStr)
          .eq('time_slot', timeSlot).eq('status','waitlist')
          .order('waitlist_position', { ascending: true }).limit(1);
        if (firstWait && firstWait.length > 0) {
          await db.from('reservations').update({ status:'confirmed', waitlist_position: null }).eq('id', firstWait[0].id);
          showToast('예약 취소 완료. 대기자가 자동 확정되었습니다.');
        } else {
          showToast('예약이 취소되었습니다.');
        }
      } else {
        showToast('대기가 취소되었습니다.');
      }
      showLoading(false);
      await loadAdminReservations();
    }

    async function adminAddRsv() {
      const userId   = document.getElementById('add-rsv-user').value;
      const classType= document.getElementById('add-rsv-class').value;
      const dateStr  = document.getElementById('add-rsv-date').value;
      const timeSlot = document.getElementById('add-rsv-time').value;
      if (!userId)   return showToast('회원을 선택해주세요.');
      if (!dateStr)  return showToast('날짜를 선택해주세요.');

      // 현재 해당 슬롯 확정 인원 확인
      showLoading(true);
      const { data: existing } = await db.from('reservations')
        .select('id').eq('user_id', userId).eq('class_type', classType)
        .eq('date', dateStr).eq('time_slot', timeSlot).eq('status','cancelled').single();

      const { data: countData } = await db.from('reservations')
        .select('id').eq('class_type', classType).eq('date', dateStr)
        .eq('time_slot', timeSlot).eq('status','confirmed');
      const confirmed = (countData || []).length;
      const max = SCHEDULE[classType].max;
      const status = confirmed < max ? 'confirmed' : 'waitlist';

      const { data: waitData } = await db.from('reservations')
        .select('id').eq('class_type', classType).eq('date', dateStr)
        .eq('time_slot', timeSlot).eq('status','waitlist');
      const waitPos = status === 'waitlist' ? (waitData||[]).length + 1 : null;

      let error;
      if (existing) {
        ({ error } = await db.from('reservations').update({ status, waitlist_position: waitPos }).eq('id', existing.id));
      } else {
        ({ error } = await db.from('reservations').insert([{ user_id: userId, class_type: classType, date: dateStr, time_slot: timeSlot, status, waitlist_position: waitPos }]));
      }
      showLoading(false);

      if (error) {
        if (error.code === '23505') return showToast('이미 해당 시간에 예약이 있습니다.');
        return showToast('예약 추가 실패: ' + (error.message || ''));
      }
      adminRsvDate = dateStr;
      showToast(status === 'confirmed' ? '✅ 예약이 추가되었습니다.' : `⏳ 대기 ${waitPos}번째로 추가되었습니다.`);
      await loadAdminReservations();
    }

    // =====================================================
    // 유틸리티
    // =====================================================
    function fmtDate(d) {
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    }

    function fmtTime(t) {
      const h = parseInt(t.split(':')[0]);
      return h < 12 ? `오전 ${h}시` : `오후 ${h - 12}시`;
    }

    function fmtPhone(p) {
      if (!p || p === 'admin') return p;
      const c = p.replace(/\D/g, '');
      if (c.length === 11) return `${c.slice(0, 3)}-${c.slice(3, 7)}-${c.slice(7)}`;
      if (c.length === 10) return `${c.slice(0, 3)}-${c.slice(3, 6)}-${c.slice(6)}`;
      return p;
    }

    function escHtml(s) {
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function showLoading(v) { document.getElementById('loading').style.display = v ? 'flex' : 'none'; }

    let _toastTimer;
    function showToast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(_toastTimer);
      _toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
    }

    // =====================================================
    // 앱 시작
    // =====================================================
    init();
  </script>
</body>

</html>
